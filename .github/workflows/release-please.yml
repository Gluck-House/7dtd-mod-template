name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    uses: "Gluck-House/7dtd-mod-infra/.github/workflows/reusable-release-please.yml@main"
    secrets: inherit

  promote-template-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' && startsWith(needs.release-please.outputs.tag_name, 'v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Dispatch template promotion workflow in infra
        shell: bash
        env:
          INFRA_REPO_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
          INFRA_REPO: Gluck-House/7dtd-mod-infra
          TEMPLATE_ID: standard-mod
          TEMPLATE_REF: ${{ needs.release-please.outputs.tag_name }}
          GITHUB_API_URL: ${{ github.api_url }}
        run: |
          set -euo pipefail

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${INFRA_REPO_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${INFRA_REPO}/actions/workflows/promote-template-release.yml/dispatches" \
            -d @- <<EOF
          {
            "ref": "main",
            "inputs": {
              "template_id": "${TEMPLATE_ID}",
              "template_ref": "${TEMPLATE_REF}"
            }
          }
          EOF
