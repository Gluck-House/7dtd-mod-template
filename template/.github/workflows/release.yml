name: release

on:
  release:
    types:
      - created

permissions:
  contents: write

jobs:
  release:
    uses: [[[infra_repo]]]/.github/workflows/reusable-release.yml@[[[infra_ref]]]
    secrets: inherit
    with:
      project_name: "[[[project_name]]]"
      artifact_folder: "[[[artifact_folder]]]"
