_subdirectory: template
_answers_file: .copier-answers.yml
_min_copier_version: "9.0.0"
_templates_suffix: ""
_skip_if_exists:
  - .github/7dtd-version.env
  - .github/release-please-manifest.json
  - "*/resources/ModInfo.xml"
  - CHANGELOG.md
  - version.txt

_envops:
  autoescape: false
  keep_trailing_newline: true
  block_start_string: "[%"
  block_end_string: "%]"
  variable_start_string: "[[["
  variable_end_string: "]]]"

project_name:
  type: str
  help: PascalCase project and namespace name used for the .NET solution and mod folder.
  default: ExampleMod

repo_name:
  type: str
  help: Git repository name for the generated mod.
  default: "7dtd[[[project_name]]]"

github_owner:
  type: str
  help: GitHub owner or organization for repository links.
  default: Gluck-House

mod_display_name:
  type: str
  help: Display name written into ModInfo.xml.
  default: "[[[project_name]]]"

mod_description:
  type: str
  help: Short description used in ModInfo.xml and README.
  default: A 7 Days to Die mod.

mod_author:
  type: str
  help: Author value written into ModInfo.xml.
  default: Gluck-House

artifact_folder:
  type: str
  help: Top-level folder name included in CI artifacts for drop-in installation under Mods/.
  default: "[[[project_name]]]"

infra_repo:
  type: str
  help: Repository containing the reusable shared GitHub workflows.
  default: Gluck-House/7dtd-mod-infra

infra_ref:
  type: str
  help: Git ref used when calling reusable workflows from the infrastructure repository.
  default: main

copyright_holder:
  type: str
  help: Copyright holder written into the generated MIT license.
  default: Gluck House

copyright_year:
  type: str
  help: Copyright year written into the generated MIT license.
  default: "2026"
